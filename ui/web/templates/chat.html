<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>乐意AI</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">乐意AI</h1>
                <button class="btn-new-chat" onclick="newConversation()">+ 新对话</button>
            </div>
            <div class="sidebar-content">
                <div class="sidebar-section">
                    <h3 class="section-title">对话历史</h3>
                    <div id="conversation-list" class="conversation-list"></div>
                </div>
                <div class="sidebar-section">
                    <h3 class="section-title">知识库</h3>
                    <div id="knowledge-status" class="knowledge-status">加载中...</div>
                    <div class="upload-area" id="uploadArea">
                        <span>📄 拖拽或点击上传文档</span>
                        <input type="file" id="fileInput" accept=".txt,.md,.pdf,.docx" hidden multiple>
                    </div>
                </div>
                <div class="sidebar-footer">
                    <div class="model-info" id="modelInfo">加载中...</div>
                </div>
            </div>
        </aside>

        <!-- 主区域 -->
        <main class="main-area">
            <!-- 聊天头部 -->
            <header class="chat-header">
                <button class="btn-toggle-sidebar" onclick="toggleSidebar()">☰</button>
                <span class="chat-title">乐意AI</span>
                <div class="header-actions">
                    <span class="tool-badge" id="toolBadge"></span>
                </div>
            </header>

            <!-- 消息区域 -->
            <div class="messages" id="messages">
                <div class="welcome-message" id="welcomeMessage">
                    <div class="welcome-icon">🤖</div>
                    <h2>你好！我是乐意AI</h2>
                    <p>我可以帮你对话、搜索信息、计算、查天气，还能阅读文档！</p>
                    <div class="welcome-tips">
                        <div class="tip">💬 在下方输入框开始对话</div>
                        <div class="tip">📄 拖拽文档到侧边栏上传</div>
                        <div class="tip">🔍 我会自动联网搜索最新信息</div>
                    </div>
                </div>
            </div>

            <!-- 输入区域 -->
            <div class="input-area">
                <div class="input-container">
                    <textarea
                        id="inputBox"
                        class="input-box"
                        placeholder="输入消息给乐意AI..."
                        rows="1"
                        oninput="autoResize(this)"
                        onkeydown="handleKeyDown(event)"
                    ></textarea>
                    <button class="btn-send" id="sendBtn" onclick="sendMessage()">
                        <span>➤</span>
                    </button>
                </div>
                <p class="input-footer">乐意AI 的回答仅供参考，请验证重要信息</p>
            </div>
        </main>
    </div>

    <script src="/static/chat.js"></script>
</body>
</html>
